<!DOCTYPE html>
<html lang="tr">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Su Ürünleri AR</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&display=swap" rel="stylesheet">

  <!-- AFRAME -->
  <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
  <!-- MINDAR -->
  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
  
  <script src="https://cdn.jsdelivr.net/gh/c-frame/aframe-extras@7.0.0/dist/aframe-extras.min.js"></script>

  <link rel="stylesheet" href="style.css" />
</head>

<body>

  <div id="startScreen">
    <div class="start-card">
      <div class="logo">🐟</div>
      <h1>Su Ürünleri AR</h1>
      <p>Kamerayı başlatıp balık görsellerini taratın, bilgi kartı ve quiz sizi bekliyor!</p>
      <button id="startBtn">Kamerayı Başlat</button>
    </div>
  </div>

  <div id="fishPopup" class="hidden">
    <div class="popup-card">
      <img id="fishImage" src="" alt="" />
      <h2 id="fishName"></h2>
      <p id="fishDesc"></p>
      <div class="info-row">
        <div class="info-box"><span class="info-label">📏 Boyut</span><span id="fishSize" class="info-val"></span></div>
        <div class="info-box"><span class="info-label">🌊 Habitat</span><span id="fishHabitat" class="info-val"></span></div>
        <div class="info-box"><span class="info-label">🍽️ Beslenme</span><span id="fishDiet" class="info-val"></span></div>
        <div class="info-box"><span class="info-label">⚠️ Durum</span><span id="fishStatus" class="info-val"></span></div>
      </div>
      <button id="quizBtn">Quiz'e Geç 🧠</button>
      <button id="closeBtn" class="btn-secondary">Kapat ve 3D İzle</button>
    </div>
  </div>

  <div id="quizPopup" class="hidden">
    <!-- Quiz kodların duruyor... -->
  </div>

  <div id="resultPopup" class="hidden">
    <!-- Sonuç kodların duruyor... -->
  </div>

<div id="aiPopup" class="hidden">
    <!-- AI kodların duruyor... -->
</div>

  <button id="aiFloatBtn" class="hidden ai-float-btn">🤖 AI Tanı</button>

  <a-scene
    mindar-image="imageTargetSrc: ./assets/targets/targets.mind; uiScanning: yes; uiLoading: yes;"
    color-space="sRGB"
    renderer="colorManagement: true; physicallyCorrectLights: true;"
    vr-mode-ui="enabled: false"
    device-orientation-permission-ui="enabled: false">

    <!-- GÜVENLİ MOD: Sadece Sazan modelini yüklemeye çalışıyoruz -->
    <a-assets>
      <a-asset-item id="modelSazan" src="./assets/models/sazan.glb"></a-asset-item>
    </a-assets>

    <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

    <a-entity mindar-image-target="targetIndex: 0"></a-entity>
    <a-entity mindar-image-target="targetIndex: 1"></a-entity>
    <a-entity mindar-image-target="targetIndex: 2"></a-entity>
    
    <!-- 3. Hedef: Sazan -->
    <a-entity mindar-image-target="targetIndex: 3">
      <a-gltf-model id="model-3" src="#modelSazan" position="0 0 0.1" scale="0.4 0.4 0.4" animation-mixer visible="false"></a-gltf-model>
    </a-entity>
    
    <a-entity mindar-image-target="targetIndex: 4"></a-entity>
    <a-entity mindar-image-target="targetIndex: 5"></a-entity>
    <a-entity mindar-image-target="targetIndex: 6"></a-entity>
    <a-entity mindar-image-target="targetIndex: 7"></a-entity>
    <a-entity mindar-image-target="targetIndex: 8"></a-entity>
    <a-entity mindar-image-target="targetIndex: 9"></a-entity>

  </a-scene>

  <script src="app.js"></script>
</body>

</html>
